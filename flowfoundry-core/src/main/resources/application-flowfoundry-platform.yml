spring:
  web:
    resources:
      # 本地开发：静态资源不缓存，避免 redeploy 后浏览器仍用旧 CSS/JS
      cache:
        period: 0
        cachecontrol:
          max-age: 0
          no-cache: true
          must-revalidate: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/flowfoundry}
    username: ${DB_USER:flowfoundry}
    password: ${DB_PASSWORD:flowfoundry}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms

temporal:
  host: ${TEMPORAL_HOST:localhost:7233}
  namespace: ${TEMPORAL_NAMESPACE:default}
  task-queue: ${TEMPORAL_TASK_QUEUE:flowfoundry-platform}
  ui-base-url: ${TEMPORAL_UI_BASE_URL:http://127.0.0.1:8080}
  max-concurrent-activities: ${TEMPORAL_MAX_CONCURRENT_ACTIVITIES:50}
  max-concurrent-workflows: ${TEMPORAL_MAX_CONCURRENT_WORKFLOWS:100}

activity:
  script-runtime:
    service-url: ${SCRIPT_RUNTIME_SERVICE_URL:}
    timeout-seconds: ${SCRIPT_RUNTIME_TIMEOUT_SECONDS:30}
    enterprise-id: ${SCRIPT_RUNTIME_ENTERPRISE_ID:}
    source-type: ${SCRIPT_RUNTIME_SOURCE_TYPE:flowfoundry}
    catalog:
      base-url: ${SCRIPT_CATALOG_BASE_URL:}
      scripts-path: ${SCRIPT_CATALOG_SCRIPTS_PATH:/ivr/jsCode/list}
      versions-path: ${SCRIPT_CATALOG_VERSIONS_PATH:/ivr/jsCode/version/list}
      http-method: ${SCRIPT_CATALOG_HTTP_METHOD:GET}

platform:
  activity-registry:
    path: ${ACTIVITY_REGISTRY_PATH:classpath:activities-registry.yaml}

flowfoundry:
  run-mode: platform
  namespace:
    # 系统 namespace：flowfoundry-core 平台管理相关 Temporal 资源使用（当前预留）。
    # 业务 workflow / run logs 落在各使用方独立的业务 namespace（由部署契约声明），见 docs/detailed-design.md §11。
    system: ${FLOWFOUNDRY_SYSTEM_NAMESPACE:flowfoundry-system}
  activity-registry:
    path: ${ACTIVITY_REGISTRY_PATH:classpath:activities-registry.yaml}
  modeler:
    embed-enabled: ${FLOWFOUNDRY_MODELER_EMBED_ENABLED:true}
    api-base: ${FLOWFOUNDRY_MODELER_API_BASE:/api}
    embed-path: ${FLOWFOUNDRY_MODELER_EMBED_PATH:/modeler/embed.html}
    sdk-script-path: ${FLOWFOUNDRY_MODELER_SDK_SCRIPT:/assets/js/flowfoundry-modeler-sdk.js}
    allow-frame-embedding: ${FLOWFOUNDRY_MODELER_ALLOW_FRAME:true}
    allowed-embed-origins:
      - http://127.0.0.1:8082
      - http://localhost:8082
  security:
    # 鉴权始终启用（无“安全关闭”开关）。默认管理员 Key 由 FLOWFOUNDRY_API_KEY 提供，
    # 未配置时回退 local-admin-key；admin=true ⇒ namespaces 为空表示可访问全部 namespace。
    admin-localhost-only: ${FLOWFOUNDRY_ADMIN_LOCALHOST_ONLY:true}
    api-keys:
      - id: platform-admin
        key: ${FLOWFOUNDRY_API_KEY:local-admin-key}
        admin: true
        namespaces: []

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.tinet.flowfoundry: INFO
    io.temporal: INFO
