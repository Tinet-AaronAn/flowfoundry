# FlowFoundry Enterprise — Production Helm Values
# Docs: https://flowfoundry.com/docs/enterprise
# Requires: Enterprise license JWT, OIDC provider, PostgreSQL, Temporal cluster
#
# Install (after pushing image to your registry):
#   helm upgrade --install flowfoundry ./deploy/helm/flowfoundry/chart \
#     -n bpm --create-namespace \
#     -f deploy/helm/flowfoundry/values-production.yaml

replicaCount: 3

image:
  repository: hub.flowfoundry.com/flowfoundry/enterprise
  tag: latest
  pullPolicy: IfNotPresent
  pullSecrets:
    - flowfoundry-registry

service:
  type: ClusterIP
  port: 9060

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: bpm.internal.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: flowfoundry-tls
      hosts:
        - bpm.internal.example.com

resources:
  requests:
    cpu: "2"
    memory: 4Gi
  limits:
    cpu: "4"
    memory: 8Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

env:
  # --- Database (required) ---
  DATABASE_URL: "postgres://flowfoundry:$(DB_PASSWORD)@flowfoundry-postgresql.bpm.svc.cluster.local:5432/flowfoundry?sslmode=require"
  DB_PASSWORD:
    secretKeyRef:
      name: flowfoundry-db-credentials
      key: password

  # --- Temporal (required for BPMN) ---
  TEMPORAL_HOST_PORT: "temporal-frontend.temporal.svc.cluster.local:7233"
  TEMPORAL_NAMESPACE: "call-campaign"
  TEMPORAL_TLS_ENABLED: "false"
  # TEMPORAL_TLS_CERT_PATH: "/etc/temporal/tls/client.pem"
  # TEMPORAL_TLS_KEY_PATH: "/etc/temporal/tls/client.key"
  # TEMPORAL_TLS_CA_PATH: "/etc/temporal/tls/ca.pem"

  # --- License (required for Enterprise) ---
  QUANTUMBPM_LICENSE_JWT:
    secretKeyRef:
      name: flowfoundry-license
      key: license-jwt

  # --- OIDC (required for Enterprise) ---
  OIDC_ISSUER_URL: "https://auth.internal.example.com/realms/platform"
  OIDC_CLIENT_ID: "flowfoundry"
  OIDC_CLIENT_SECRET:
    secretKeyRef:
      name: flowfoundry-oidc
      key: client-secret
  OIDC_AUDIENCE: "flowfoundry-api"
  # Map OIDC claim to project roles, e.g. groups or roles claim
  OIDC_ROLES_CLAIM: "roles"

  # --- Runtime tuning ---
  REST_MAX_BODY_SIZE: "10mb"
  BPMN_WORKER_TASK_QUEUE_PREFIX: "flowfoundry-"
  FEEL_EVALUATION_BUDGET_MS: "5000"
  CACHE_TTL_SECONDS: "300"

  # --- Observability ---
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.observability.svc.cluster.local:4317"
  OTEL_SERVICE_NAME: "flowfoundry"
  LOG_LEVEL: "info"

extraVolumeMounts:
  - name: temporal-tls
    mountPath: /etc/temporal/tls
    readOnly: true

extraVolumes:
  - name: temporal-tls
    secret:
      secretName: temporal-client-tls
      optional: true

livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

postgresql:
  enabled: true
  auth:
    existingSecret: flowfoundry-db-credentials
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
    username: flowfoundry
    database: flowfoundry
  architecture: replication
  primary:
    persistence:
      size: 200Gi
      storageClass: fast-ssd
    resources:
      requests:
        cpu: "2"
        memory: 8Gi
  readReplicas:
    replicaCount: 1

redis:
  enabled: true
  architecture: replication
  auth:
    existingSecret: flowfoundry-redis-credentials
  master:
    persistence:
      size: 20Gi
    resources:
      requests:
        cpu: "1"
        memory: 4Gi
  replica:
    replicaCount: 2
    resources:
      requests:
        cpu: "500m"
        memory: 2Gi

# Activity Worker (your business workers — separate deployment)
activityWorker:
  enabled: true
  replicaCount: 20
  image:
    repository: registry.internal.example.com/call-campaign-worker
    tag: "1.0.0"
  taskQueue: call-campaign
  temporalHost: temporal-frontend.temporal.svc.cluster.local:7233
  temporalNamespace: call-campaign
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  autoscaling:
    enabled: true
    minReplicas: 10
    maxReplicas: 50
    metrics:
      - type: External
        external:
          metric:
            name: temporal_activity_schedule_to_start_latency_p99
          target:
            type: Value
            value: "150m"
  env:
    REDIS_URL: "redis://:$(REDIS_PASSWORD)@flowfoundry-redis-master.bpm.svc.cluster.local:6379"
    REDIS_PASSWORD:
      secretKeyRef:
        name: flowfoundry-redis-credentials
        key: password
    ACTIVITY_REGISTRY_PATH: "/config/activities-registry.yaml"
