# Copy and fill before applying: kubectl apply -f secrets.yaml -n temporal|bpm
# NEVER commit real secrets to git.
---
apiVersion: v1
kind: Secret
metadata:
  name: temporal-db-credentials
  namespace: temporal
type: Opaque
stringData:
  password: "CHANGE_ME_temporal_db"
  postgres-password: "CHANGE_ME_postgres_admin"
---
apiVersion: v1
kind: Secret
metadata:
  name: flowfoundry-db-credentials
  namespace: bpm
type: Opaque
stringData:
  password: "CHANGE_ME_flowfoundry_db"
  postgres-password: "CHANGE_ME_postgres_admin"
---
apiVersion: v1
kind: Secret
metadata:
  name: flowfoundry-redis-credentials
  namespace: bpm
type: Opaque
stringData:
  password: "CHANGE_ME_redis"
---
apiVersion: v1
kind: Secret
metadata:
  name: flowfoundry-license
  namespace: bpm
type: Opaque
stringData:
  license-jwt: "PASTE_VENDOR_LICENSE_JWT"
---
apiVersion: v1
kind: Secret
metadata:
  name: flowfoundry-oidc
  namespace: bpm
type: Opaque
stringData:
  client-secret: "CHANGE_ME_oidc_client_secret"
