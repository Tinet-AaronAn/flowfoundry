# AI 催收策略 Demo — Activity 注册表（配置示例）
# - 本地 redeploy：file: 指向本文件
# - JAR 内 classpath 兜底：由 flowfoundry-core 构建时复制
# - Docker/K8s：挂载到 /config/activities-registry.yaml

version: "1.0"
namespace: ai-collection-strategy
defaultTaskQueue: ai-collection-strategy

activities:
  - id: import-numbers
    name: 下发号码批次
    description: 从业务系统导入待外呼号码批次，初始化活动上下文
    taskQueue: ai-collection-strategy
    timeout: 120s
    retry:
      maximumAttempts: 5
    input:
      - { name: campaignId, type: string, required: true }
    output:
      - { name: totalContacts, type: integer }
      - { name: sourceRef, type: string }
    idempotency:
      keyPattern: "{campaignId}:import-numbers"
      ttl: 24h

  - id: filter-and-split-batches
    name: 规则筛选并分批
    description: 按业务规则筛选号码并拆分为外呼批次
    taskQueue: ai-collection-strategy
    timeout: 120s
    retry:
      maximumAttempts: 3
    input:
      - { name: campaignId, type: string, required: true }
    output:
      - { name: batchCount, type: integer }
      - { name: eligibleContacts, type: integer }
    idempotency:
      keyPattern: "{campaignId}:filter-split"
      ttl: 72h

  - id: notify-owner-report
    name: 汇报批次结果
    description: 向业务负责人发送批次筛选结果摘要
    taskQueue: ai-collection-strategy
    timeout: 60s
    retry:
      maximumAttempts: 3
    input:
      - { name: campaignId, type: string, required: true }
      - { name: batchCount, type: integer, required: true }
      - { name: eligibleContacts, type: integer, required: true }
    output:
      - { name: notificationId, type: string }
      - { name: reportSummary, type: string }
    idempotency:
      keyPattern: "{campaignId}:notify-owner"
      ttl: 72h

  - id: load-campaign
    name: 加载呼叫活动
    description: 校验活动配置，加载联系人批次与轮次策略
    taskQueue: ai-collection-strategy
    timeout: 60s
    retry:
      initialInterval: 2s
      backoffCoefficient: 2.0
      maximumAttempts: 5
      nonRetryableErrors:
        - CampaignNotFoundException
        - InvalidCampaignConfigException
    input:
      - { name: campaignId, type: string, required: true }
    output:
      - { name: totalContacts, type: integer }
      - { name: maxRounds, type: integer }
      - { name: roundIntervalMinutes, type: integer }
    idempotency:
      keyPattern: "{campaignId}:load-campaign"
      ttl: 24h

  - id: prepare-call-round
    name: 准备本轮呼叫
    description: 根据上一轮结果筛选待呼联系人，生成本轮呼叫批次
    taskQueue: ai-collection-strategy
    timeout: 120s
    retry:
      maximumAttempts: 3
    input:
      - { name: campaignId, type: string, required: true }
      - { name: roundNumber, type: integer, required: true }
    output:
      - { name: batchId, type: string }
      - { name: contactCount, type: integer }
    idempotency:
      keyPattern: "{campaignId}:prepare-round:{roundNumber}"
      ttl: 72h

  - id: execute-call-round
    name: 执行本轮外呼
    description: 调用外呼平台发起批量呼叫，返回 taskId
    taskQueue: ai-collection-strategy
    timeout: 300s
    heartbeatTimeout: 30s
    retry:
      maximumAttempts: 5
    input:
      - { name: campaignId, type: string, required: true }
      - { name: roundNumber, type: integer, required: true }
      - { name: batchId, type: string, required: true }
    output:
      - { name: dialerTaskId, type: string }
      - { name: submittedCount, type: integer }
    idempotency:
      keyPattern: "{campaignId}:execute-round:{roundNumber}"
      ttl: 72h

  - id: wait-round-completion
    name: 等待外呼结束
    description: Activity 内轮询外呼平台直到本轮全部终态
    taskQueue: ai-collection-strategy
    timeout: 3600s
    heartbeatTimeout: 60s
    retry:
      maximumAttempts: 10
    input:
      - { name: campaignId, type: string, required: true }
      - { name: roundNumber, type: integer, required: true }
      - { name: dialerTaskId, type: string, required: true }
    output:
      - { name: connectedCount, type: integer }
      - { name: noAnswerCount, type: integer }
      - { name: failedCount, type: integer }
      - { name: pendingCount, type: integer }
    idempotency:
      keyPattern: "{campaignId}:wait-round:{roundNumber}"
      ttl: 72h

  - id: start-ai-tagging
    name: 启动录音 AI 打标
    description: 提交本轮录音到 AI 打标服务
    taskQueue: ai-collection-strategy
    timeout: 120s
    retry:
      maximumAttempts: 3
    input:
      - { name: campaignId, type: string, required: true }
      - { name: roundNumber, type: integer, required: true }
      - { name: recordingCount, type: integer, required: false }
    output:
      - { name: taggingJobId, type: string }
      - { name: recordingCount, type: integer }
    idempotency:
      keyPattern: "{campaignId}:start-tagging:{roundNumber}"
      ttl: 72h

  - id: wait-tagging-completion
    name: 等待打标完成
    description: Activity 内轮询 AI 打标任务直到完成
    taskQueue: ai-collection-strategy
    timeout: 3600s
    heartbeatTimeout: 60s
    retry:
      maximumAttempts: 10
    input:
      - { name: campaignId, type: string, required: true }
      - { name: roundNumber, type: integer, required: true }
      - { name: taggingJobId, type: string, required: true }
    output:
      - { name: taggedCount, type: integer }
      - { name: failedCount, type: integer }
      - { name: pendingCount, type: integer }
    idempotency:
      keyPattern: "{campaignId}:wait-tagging:{roundNumber}"
      ttl: 72h

  - id: filter-next-round
    name: 筛选下一轮名单
    description: 结合标签、呼叫结果等条件筛选下一轮外呼名单，并判断是否继续
    taskQueue: ai-collection-strategy
    timeout: 120s
    retry:
      maximumAttempts: 3
    input:
      - { name: campaignId, type: string, required: true }
      - { name: roundNumber, type: integer, required: true }
      - { name: remainingContacts, type: integer, required: true }
      - { name: maxRounds, type: integer, required: true }
    output:
      - { name: continueNextRound, type: boolean }
      - { name: reason, type: string }
    idempotency:
      keyPattern: "{campaignId}:filter-next-round:{roundNumber}"
      ttl: 72h

  - id: aggregate-round-results
    name: 汇总本轮结果
    description: 写入本轮统计，更新联系人状态，计算是否进入下一轮
    taskQueue: ai-collection-strategy
    timeout: 120s
    retry:
      maximumAttempts: 3
    input:
      - { name: campaignId, type: string, required: true }
      - { name: roundNumber, type: integer, required: true }
    output:
      - { name: shouldContinue, type: boolean }
      - { name: remainingContacts, type: integer }
      - { name: nextRoundNumber, type: integer }
    idempotency:
      keyPattern: "{campaignId}:aggregate-round:{roundNumber}"
      ttl: 72h

  - id: supervisor-review
    name: 主管复核（Human Task 配套 Activity）
    description: 创建主管待办，等待 Signal 后继续；由 Human Task 节点触发
    taskQueue: ai-collection-strategy
    timeout: 86400s
    retry:
      maximumAttempts: 3
    input:
      - { name: campaignId, type: string, required: true }
      - { name: roundNumber, type: integer, required: true }
      - { name: assigneeRole, type: string, default: "supervisor" }
    output:
      - { name: approved, type: boolean }
      - { name: comment, type: string }
    idempotency:
      keyPattern: "{campaignId}:supervisor-review:{roundNumber}"
      ttl: 168h

  - id: finalize-campaign
    name: 结束活动
    description: 归档统计、发送报告、释放资源
    taskQueue: ai-collection-strategy
    timeout: 120s
    retry:
      maximumAttempts: 5
    input:
      - { name: campaignId, type: string, required: true }
      - { name: totalRoundsExecuted, type: integer, required: true }
    output:
      - { name: reportUrl, type: string }
      - { name: finalStatus, type: string }
    idempotency:
      keyPattern: "{campaignId}:finalize"
      ttl: 168h

  - id: evaluate-next-round
    name: 评估是否进入下一轮
    description: 供 DMN / 网关使用的决策 Activity，也可内嵌规则
    taskQueue: ai-collection-strategy
    timeout: 30s
    retry:
      maximumAttempts: 3
    input:
      - { name: campaignId, type: string, required: true }
      - { name: roundNumber, type: integer, required: true }
      - { name: remainingContacts, type: integer, required: true }
      - { name: maxRounds, type: integer, required: true }
    output:
      - { name: continueNextRound, type: boolean }
      - { name: reason, type: string }
    idempotency:
      keyPattern: "{campaignId}:eval-next-round:{roundNumber}"
      ttl: 72h
