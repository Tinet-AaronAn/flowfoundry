<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 催收策略 - 流程编排</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1419;
        --panel: #1a1f26;
        --text: #e8edf3;
        --muted: #9aa4b2;
        --accent: #2587e6;
        --line: #2d3640;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 14px 20px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
        flex-wrap: wrap;
      }
      header h1 { margin: 0; font-size: 18px; font-weight: 600; }
      header .meta { color: var(--muted); font-size: 13px; }
      header .spacer { flex: 1; }
      header button.action {
        background: var(--accent);
        color: #fff;
        border: 0;
        border-radius: 8px;
        padding: 8px 14px;
        cursor: pointer;
        font-size: 13px;
      }
      header button.secondary {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--text);
      }
      #status { font-size: 13px; color: var(--muted); }
      main {
        min-height: 0;
        padding: 12px;
        display: flex;
        flex-direction: column;
      }
      #modelerHost {
        flex: 1;
        min-height: 480px;
        position: relative;
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        background: #101418;
      }
      #modelerHost iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>AI 催收策略工作台</h1>
      <span class="meta">业务壳 · API 经 App BFF（同源）→ SDK Client → 平台 :8081</span>
      <span class="spacer"></span>
      <span id="status">加载中…</span>
      <button type="button" class="action secondary" id="openPlatformBtn">打开平台管理页</button>
      <button type="button" class="action" id="reloadBtn">刷新画布</button>
    </header>
    <main>
      <div id="modelerHost"></div>
    </main>
    <script>
      const PLATFORM_ORIGIN = window.FLOWFOUNDRY_PLATFORM_ORIGIN || 'http://127.0.0.1:8081';
      const BFF_API_BASE = '/app/api/flowfoundry';

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = src;
          script.onload = () => resolve();
          script.onerror = () => reject(new Error(`Failed to load script: ${src}`));
          document.head.appendChild(script);
        });
      }

      async function loadPlatformSdk() {
        const response = await fetch(`${BFF_API_BASE}/platform/public-config`, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`public-config HTTP ${response.status}`);
        }
        const config = await response.json();
        const base = config.modeler?.sdkScriptPath || '/assets/js/flowfoundry-modeler-sdk.js';
        const version = config.staticAssetVersion;
        const joiner = base.includes('?') ? '&' : '?';
        const path = version ? `${base}${joiner}v=${encodeURIComponent(version)}` : base;
        const src = path.startsWith('http') ? path : `${PLATFORM_ORIGIN}${path}`;
        await loadScript(src);
        return config;
      }
    </script>
    <script>
      const statusEl = document.getElementById('status');
      let currentWorkflowId = '';
      let currentVersion = '';

      function setStatus(text) {
        statusEl.textContent = text;
      }

      async function mountModeler(workflowId, version) {
        const host = document.getElementById('modelerHost');
        host.replaceChildren();
        const iframe = await FlowFoundryModeler.mountIframe(host, {
          workflowId,
          version,
          mode: 'design',
          height: '100%',
          onMessage(event, data) {
            if (event.origin !== PLATFORM_ORIGIN) return;
            if (data.type === 'flowfoundry:ready') {
              currentWorkflowId = data.workflowId || workflowId;
              currentVersion = data.version || version;
              setStatus(`已加载 ${currentWorkflowId} @ v${currentVersion}`);
            }
            if (data.type === 'flowfoundry:saved') {
              currentWorkflowId = data.workflowId || currentWorkflowId;
              currentVersion = data.version || currentVersion;
              setStatus(`已保存 ${data.name || currentWorkflowId} @ v${currentVersion}`);
            }
          }
        });
        return iframe;
      }

      async function bootstrap() {
        try {
          const publicConfig = await loadPlatformSdk();
          const config = await FlowFoundryModeler.loadConfig({
            config: {
              ...publicConfig,
              modeler: {
                ...publicConfig.modeler,
                embedEnabled: true,
                embedPath: `${PLATFORM_ORIGIN}/modeler/embed.html`,
                apiBase: BFF_API_BASE
              }
            }
          });
          if (!config.modeler?.embedEnabled) {
            setStatus('平台未启用建模器嵌入，请先启动 :8081 flowfoundry-core');
            return;
          }

          const params = new URLSearchParams(location.search);
          const workflowId = params.get('workflowId') || '';
          const version = params.get('version') || '';

          await mountModeler(workflowId, version);
          if (!workflowId) {
            setStatus('已打开空白流程（保存后将获得 workflowId）');
          }
        } catch (err) {
          setStatus(`加载失败: ${err.message} — 请确认 App :8082 与平台 :8081 已启动`);
        }
      }

      document.getElementById('reloadBtn').addEventListener('click', () => bootstrap());
      document.getElementById('openPlatformBtn').addEventListener('click', () => {
        const url = currentWorkflowId
          ? `${PLATFORM_ORIGIN}/?workflowId=${encodeURIComponent(currentWorkflowId)}&version=${encodeURIComponent(currentVersion)}`
          : PLATFORM_ORIGIN + '/';
        window.open(url, '_blank');
      });

      loadPlatformSdk()
        .then(() => bootstrap())
        .catch(err => setStatus(`加载失败: ${err.message} — 请确认 App :8082 与平台 :8081 已启动`));
    </script>
  </body>
</html>
