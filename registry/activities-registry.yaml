# Activity 注册表 — 多轮呼叫任务管理流程
# QuantumBPM BPMN Service Task 通过 activityType 字段映射到此注册表
# Worker 启动时加载，用于校验、文档生成、超时/重试默认值

version: "1.0"
namespace: call-campaign
defaultTaskQueue: call-campaign

activities:
  - id: load-campaign
    name: 加载呼叫活动
    description: 校验活动配置，加载联系人批次与轮次策略
    taskQueue: call-campaign
    timeout: 60s
    retry:
      initialInterval: 2s
      backoffCoefficient: 2.0
      maximumAttempts: 5
      nonRetryableErrors:
        - CampaignNotFoundException
        - InvalidCampaignConfigException
    input:
      - { name: campaignId, type: string, required: true }
    output:
      - { name: totalContacts, type: integer }
      - { name: maxRounds, type: integer }
      - { name: roundIntervalMinutes, type: integer }
    idempotency:
      keyPattern: "{campaignId}:load-campaign"
      ttl: 24h

  - id: prepare-call-round
    name: 准备本轮呼叫
    description: 根据上一轮结果筛选待呼联系人，生成本轮呼叫批次
    taskQueue: call-campaign
    timeout: 120s
    retry:
      maximumAttempts: 3
    input:
      - { name: campaignId, type: string, required: true }
      - { name: roundNumber, type: integer, required: true }
    output:
      - { name: batchId, type: string }
      - { name: contactCount, type: integer }
    idempotency:
      keyPattern: "{campaignId}:prepare-round:{roundNumber}"
      ttl: 72h

  - id: execute-call-round
    name: 执行本轮外呼
    description: 调用外呼平台发起批量呼叫，返回 taskId
    taskQueue: call-campaign
    timeout: 300s
    heartbeatTimeout: 30s
    retry:
      maximumAttempts: 5
    input:
      - { name: campaignId, type: string, required: true }
      - { name: roundNumber, type: integer, required: true }
      - { name: batchId, type: string, required: true }
    output:
      - { name: dialerTaskId, type: string }
      - { name: submittedCount, type: integer }
    idempotency:
      keyPattern: "{campaignId}:execute-round:{roundNumber}"
      ttl: 72h

  - id: wait-round-completion
    name: 等待本轮完成
    description: 轮询外呼平台直到本轮全部终态（接通/未接/忙/失败）
    taskQueue: call-campaign
    timeout: 3600s
    heartbeatTimeout: 60s
    retry:
      maximumAttempts: 10
    input:
      - { name: campaignId, type: string, required: true }
      - { name: roundNumber, type: integer, required: true }
      - { name: dialerTaskId, type: string, required: true }
    output:
      - { name: connectedCount, type: integer }
      - { name: noAnswerCount, type: integer }
      - { name: failedCount, type: integer }
      - { name: pendingCount, type: integer }
    idempotency:
      keyPattern: "{campaignId}:wait-round:{roundNumber}"
      ttl: 72h

  - id: aggregate-round-results
    name: 汇总本轮结果
    description: 写入本轮统计，更新联系人状态，计算是否进入下一轮
    taskQueue: call-campaign
    timeout: 120s
    retry:
      maximumAttempts: 3
    input:
      - { name: campaignId, type: string, required: true }
      - { name: roundNumber, type: integer, required: true }
    output:
      - { name: shouldContinue, type: boolean }
      - { name: remainingContacts, type: integer }
      - { name: nextRoundNumber, type: integer }
    idempotency:
      keyPattern: "{campaignId}:aggregate-round:{roundNumber}"
      ttl: 72h

  - id: supervisor-review
    name: 主管复核（User Task 配套 Activity）
    description: 创建主管待办，等待 Signal 后继续；BPMN User Task 节点调用
    taskQueue: call-campaign
    timeout: 86400s
    retry:
      maximumAttempts: 3
    input:
      - { name: campaignId, type: string, required: true }
      - { name: roundNumber, type: integer, required: true }
      - { name: assigneeRole, type: string, default: "supervisor" }
    output:
      - { name: approved, type: boolean }
      - { name: comment, type: string }
    idempotency:
      keyPattern: "{campaignId}:supervisor-review:{roundNumber}"
      ttl: 168h

  - id: finalize-campaign
    name: 结束活动
    description: 归档统计、发送报告、释放资源
    taskQueue: call-campaign
    timeout: 120s
    retry:
      maximumAttempts: 5
    input:
      - { name: campaignId, type: string, required: true }
      - { name: totalRoundsExecuted, type: integer, required: true }
    output:
      - { name: reportUrl, type: string }
      - { name: finalStatus, type: string }
    idempotency:
      keyPattern: "{campaignId}:finalize"
      ttl: 168h

  - id: evaluate-next-round
    name: 评估是否进入下一轮
    description: 供 DMN / 网关使用的决策 Activity，也可内嵌规则
    taskQueue: call-campaign
    timeout: 30s
    retry:
      maximumAttempts: 3
    input:
      - { name: campaignId, type: string, required: true }
      - { name: roundNumber, type: integer, required: true }
      - { name: remainingContacts, type: integer, required: true }
      - { name: maxRounds, type: integer, required: true }
    output:
      - { name: continueNextRound, type: boolean }
      - { name: reason, type: string }
    idempotency:
      keyPattern: "{campaignId}:eval-next-round:{roundNumber}"
      ttl: 72h
