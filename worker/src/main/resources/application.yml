spring:
  application:
    name: call-campaign-worker
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms

temporal:
  host: ${TEMPORAL_HOST:localhost:7233}
  namespace: ${TEMPORAL_NAMESPACE:call-campaign}
  task-queue: ${TEMPORAL_TASK_QUEUE:call-campaign}
  max-concurrent-activities: ${TEMPORAL_MAX_CONCURRENT_ACTIVITIES:50}
  max-concurrent-workflows: ${TEMPORAL_MAX_CONCURRENT_WORKFLOWS:100}

platform:
  activity-registry:
    path: ${ACTIVITY_REGISTRY_PATH:classpath:activities-registry.yaml}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.example.platform: INFO
    io.temporal: INFO
