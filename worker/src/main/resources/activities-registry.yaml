# Bundled copy — production mounts ConfigMap at /config/activities-registry.yaml
version: "1.0"
namespace: call-campaign
defaultTaskQueue: call-campaign

activities:
  - id: load-campaign
    name: 加载呼叫活动
    taskQueue: call-campaign
    timeout: 60s
    retry:
      maximumAttempts: 5
    idempotency:
      keyPattern: "{campaignId}:load-campaign"
      ttl: 24h

  - id: prepare-call-round
    name: 准备本轮呼叫
    taskQueue: call-campaign
    timeout: 120s
    retry:
      maximumAttempts: 3
    idempotency:
      keyPattern: "{campaignId}:prepare-round:{roundNumber}"
      ttl: 72h

  - id: execute-call-round
    name: 执行本轮外呼
    taskQueue: call-campaign
    timeout: 300s
    retry:
      maximumAttempts: 5
    idempotency:
      keyPattern: "{campaignId}:execute-round:{roundNumber}"
      ttl: 72h

  - id: wait-round-completion
    name: 等待本轮完成
    taskQueue: call-campaign
    timeout: 3600s
    retry:
      maximumAttempts: 10
    idempotency:
      keyPattern: "{campaignId}:wait-round:{roundNumber}"
      ttl: 72h

  - id: aggregate-round-results
    name: 汇总本轮结果
    taskQueue: call-campaign
    timeout: 120s
    retry:
      maximumAttempts: 3
    idempotency:
      keyPattern: "{campaignId}:aggregate-round:{roundNumber}"
      ttl: 72h

  - id: supervisor-review
    name: 主管复核
    taskQueue: call-campaign
    timeout: 86400s
    retry:
      maximumAttempts: 3
    idempotency:
      keyPattern: "{campaignId}:supervisor-review:{roundNumber}"
      ttl: 168h

  - id: finalize-campaign
    name: 结束活动
    taskQueue: call-campaign
    timeout: 120s
    retry:
      maximumAttempts: 5
    idempotency:
      keyPattern: "{campaignId}:finalize"
      ttl: 168h

  - id: evaluate-next-round
    name: 评估是否进入下一轮
    taskQueue: call-campaign
    timeout: 30s
    retry:
      maximumAttempts: 3
    idempotency:
      keyPattern: "{campaignId}:eval-next-round:{roundNumber}"
      ttl: 72h
